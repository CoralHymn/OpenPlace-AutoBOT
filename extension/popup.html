<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #e0e0e0;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 18px 20px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header .logo { font-size: 32px; margin-bottom: 4px; }
    .header h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .header .subtitle { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

    .bot-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bot-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .bot-card:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
      transform: translateX(2px);
    }
    .bot-card:active { transform: scale(0.98); }
    .bot-card.running {
      border-color: #4CAF50;
      background: rgba(76,175,80,0.12);
      pointer-events: none;
    }
    .bot-card.error {
      border-color: #f44336;
      background: rgba(244,67,54,0.1);
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .bot-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .bot-icon.farm { background: rgba(139,195,74,0.2); }
    .bot-icon.guard { background: rgba(66,165,245,0.2); }
    .bot-icon.image { background: rgba(171,71,188,0.2); }
    .bot-icon.launcher { background: rgba(255,152,0,0.2); }
    .bot-icon.slave { background: rgba(0,188,212,0.2); }

    .bot-info { flex: 1; min-width: 0; }
    .bot-info .name {
      font-size: 14px; font-weight: 600; color: #fff;
      margin-bottom: 2px;
    }
    .bot-info .desc {
      font-size: 11px; color: rgba(255,255,255,0.5);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .bot-run {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .bot-run:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.4);
    }
    .bot-run.loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .footer {
      padding: 10px 16px 14px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .status {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      min-height: 16px;
      line-height: 16px;
      transition: color 0.3s ease;
    }
    .status.success { color: #4CAF50; }
    .status.error { color: #f44336; }
    .status.info { color: #42A5F5; }
    .status.warning { color: #FFA726; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🤖</div>
    <h1>WPlace AutoBOT</h1>
    <p class="subtitle">Automation toolkit for wplace.live</p>
  </div>

  <div class="bot-list" id="botList">
    <div class="bot-card" data-bot="farm">
      <div class="bot-icon farm">🌾</div>
      <div class="bot-info">
        <div class="name">Auto-Farm</div>
        <div class="desc">Automatic pixel farming</div>
      </div>
      <button class="bot-run" data-action="run">▶ Run</button>
    </div>

    <div class="bot-card" data-bot="guard">
      <div class="bot-icon guard">🛡️</div>
      <div class="bot-info">
        <div class="name">Auto-Guard</div>
        <div class="desc">Protect &amp; repair artwork</div>
      </div>
      <button class="bot-run" data-action="run">▶ Run</button>
    </div>

    <div class="bot-card" data-bot="image">
      <div class="bot-icon image">🖼️</div>
      <div class="bot-info">
        <div class="name">Auto-Image</div>
        <div class="desc">Draw pixel art from images</div>
      </div>
      <button class="bot-run" data-action="run">▶ Run</button>
    </div>

    <div class="bot-card" data-bot="launcher">
      <div class="bot-icon launcher">🚀</div>
      <div class="bot-info">
        <div class="name">Auto-Launcher</div>
        <div class="desc">Bot mode selector</div>
      </div>
      <button class="bot-run" data-action="run">▶ Run</button>
    </div>

    <div class="bot-card" data-bot="slave">
      <div class="bot-icon slave">🤝</div>
      <div class="bot-info">
        <div class="name">Auto-Slave</div>
        <div class="desc">Coordinated painting</div>
      </div>
      <button class="bot-run" data-action="run">▶ Run</button>
    </div>
  </div>

  <div class="footer">
    <div class="status" id="status">Ready</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
