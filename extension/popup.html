<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      min-height: 520px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      padding: 20px 24px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .header .logo { font-size: 34px; margin-bottom: 6px; line-height: 1; }
    .header h1 { font-size: 19px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
    .header .subtitle { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 3px; }

    .bot-list {
      flex: 1;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }

    .bot-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .bot-card:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.15);
      transform: translateX(3px);
    }
    .bot-card:active { transform: scale(0.98); }
    .bot-card.running {
      border-color: #4CAF50;
      background: rgba(76,175,80,0.12);
      pointer-events: none;
    }
    .bot-card.error {
      border-color: #f44336;
      background: rgba(244,67,54,0.1);
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .bot-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      line-height: 1;
    }
    .bot-icon.farm   { background: rgba(139,195,74,0.18); }
    .bot-icon.guard  { background: rgba(66,165,245,0.18); }
    .bot-icon.image  { background: rgba(171,71,188,0.18); }
    .bot-icon.launcher { background: rgba(255,152,0,0.18); }
    .bot-icon.slave  { background: rgba(0,188,212,0.18); }

    .bot-info {
      flex: 1;
      min-width: 0;
    }
    .bot-info .name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 3px;
    }
    .bot-info .desc {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bot-run {
      padding: 7px 16px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .bot-run:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.35);
    }
    .bot-run:active { transform: scale(0.95); }
    .bot-run.loading {
      opacity: 0.5;
      pointer-events: none;
    }

    .footer {
      padding: 12px 18px 16px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .status {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      min-height: 18px;
      line-height: 18px;
      transition: color 0.3s ease;
    }
    .status.success { color: #4CAF50; }
    .status.error   { color: #f44336; }
    .status.info    { color: #42A5F5; }
    .status.warning { color: #FFA726; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">&#x1f916;</div>
    <h1>WPlace AutoBOT</h1>
    <p class="subtitle">Automation toolkit for wp.1515810.xyz</p>
  </div>

  <div class="bot-list" id="botList">
    <div class="bot-card" data-bot="farm">
      <div class="bot-icon farm">&#x1f33e;</div>
      <div class="bot-info">
        <div class="name">Auto-Farm</div>
        <div class="desc">Automatic pixel farming</div>
      </div>
      <button class="bot-run" data-action="run">&#x25b6; Run</button>
    </div>

    <div class="bot-card" data-bot="guard">
      <div class="bot-icon guard">&#x1f6e1;</div>
      <div class="bot-info">
        <div class="name">Auto-Guard</div>
        <div class="desc">Protect &amp; repair artwork</div>
      </div>
      <button class="bot-run" data-action="run">&#x25b6; Run</button>
    </div>

    <div class="bot-card" data-bot="image">
      <div class="bot-icon image">&#x1f5bc;</div>
      <div class="bot-info">
        <div class="name">Auto-Image</div>
        <div class="desc">Draw pixel art from images</div>
      </div>
      <button class="bot-run" data-action="run">&#x25b6; Run</button>
    </div>

    <div class="bot-card" data-bot="launcher">
      <div class="bot-icon launcher">&#x1f680;</div>
      <div class="bot-info">
        <div class="name">Auto-Launcher</div>
        <div class="desc">Bot mode selector</div>
      </div>
      <button class="bot-run" data-action="run">&#x25b6; Run</button>
    </div>

    <div class="bot-card" data-bot="slave">
      <div class="bot-icon slave">&#x1f91d;</div>
      <div class="bot-info">
        <div class="name">Auto-Slave</div>
        <div class="desc">Coordinated painting</div>
      </div>
      <button class="bot-run" data-action="run">&#x25b6; Run</button>
    </div>
  </div>

  <div class="footer">
    <div class="status" id="status">Ready</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
